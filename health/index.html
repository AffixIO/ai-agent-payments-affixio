<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health & API Status — AffixIO Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0b0f; --surface: #12141c; --border: #1e2230; --text: #e8eaef; --muted: #6b7280; --accent: #f59e0b; --ok: #10b981; --err: #ef4444; --radius: 12px; --font: 'Outfit', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 40px 24px 80px; }
    a { color: var(--accent); }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .sub { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    button { padding: 10px 20px; font-size: 13px; font-weight: 600; font-family: var(--font); cursor: pointer; background: var(--accent); color: #0a0b0f; border: none; border-radius: 8px; }
    .out { margin-top: 12px; padding: 12px; background: var(--bg); border-radius: 8px; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    .out.ok { border-left: 3px solid var(--ok); }
    .out.err { border-left: 3px solid var(--err); }
    .nav { margin-bottom: 20px; font-size: 14px; }
    .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .status.up { background: var(--ok); }
    .status.down { background: var(--err); }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="nav"><a href="../">← Demos</a></p>
    <h1>Health & API Status</h1>
    <p class="sub">Check api.affix-io.com health. No API key required.</p>

    <div class="panel">
      <h2>GET /api/health</h2>
      <p style="font-size: 12px; color: var(--muted); margin-bottom: 10px;">Uses /api/health (proxied to API). No key required.</p>
      <button id="btn-health">Check health</button>
      <div id="health-out" class="out" style="display:none;"></div>
    </div>
  </div>

  <script src="../shared/affix-api.js"></script>
  <script>
    function show(el, text, isErr) {
      el.style.display = 'block';
      el.textContent = text;
      el.className = 'out ' + (isErr ? 'err' : 'ok');
    }

    document.getElementById('btn-health').onclick = async function () {
      const out = document.getElementById('health-out');
      this.disabled = true;
      show(out, 'Checking…', false);
      try {
        const res = await AffixAPI.health();
        show(out, JSON.stringify(res, null, 2), false);
      } catch (e) {
        show(out, 'Error: ' + e.message, true);
      }
      this.disabled = false;
    };
  </script>
</body>
</html>
