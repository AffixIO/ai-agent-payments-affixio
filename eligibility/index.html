<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eligibility Check — AffixIO Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0b0f; --surface: #12141c; --border: #1e2230; --text: #e8eaef; --muted: #6b7280; --accent: #f59e0b; --ok: #10b981; --err: #ef4444; --radius: 12px; --font: 'Outfit', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 40px 24px 80px; }
    a { color: var(--accent); }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .sub { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 13px; margin-bottom: 12px; }
    textarea { min-height: 80px; resize: vertical; }
    button { padding: 10px 20px; font-size: 13px; font-weight: 600; font-family: var(--font); cursor: pointer; background: var(--accent); color: #0a0b0f; border: none; border-radius: 8px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .out { margin-top: 12px; padding: 12px; background: var(--bg); border-radius: 8px; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-all; max-height: 280px; overflow-y: auto; }
    .out.ok { border-left: 3px solid var(--ok); }
    .out.err { border-left: 3px solid var(--err); }
    .nav { margin-bottom: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="nav"><a href="../">← Demos</a></p>
    <h1>Eligibility Check</h1>
    <p class="sub">Call the eligibility API with a demo key. Stateless yes/no decisions.</p>

    <div class="panel">
      <h2>Get demo key</h2>
      <button id="btn-key">Get demo key</button>
      <div id="key-out" class="out" style="display:none;"></div>
    </div>

    <div class="panel">
      <h2>Check eligibility</h2>
      <label>Request body (JSON) — identifier, dataSources (array), rules (array)</label>
      <textarea id="body">{"identifier": "user_elig_1", "dataSources": [{"id": "default", "queryParams": {}}], "rules": ["age_18_plus"]}</textarea>
      <button id="btn-check">Check eligibility</button>
      <div id="check-out" class="out" style="display:none;"></div>
    </div>
  </div>

  <script src="../shared/affix-api.js"></script>
  <script>
    let demoKey = null;

    function show(el, text, isErr) {
      el.style.display = 'block';
      el.textContent = text;
      el.className = 'out ' + (isErr ? 'err' : 'ok');
    }
    function log(el, obj) { show(el, JSON.stringify(obj, null, 2), !!obj.error); }

    document.getElementById('btn-key').onclick = async function () {
      const out = document.getElementById('key-out');
      this.disabled = true;
      try {
        demoKey = await AffixAPI.getDemoKey();
        show(out, 'Demo key received.', false);
      } catch (e) { show(out, 'Error: ' + e.message, true); }
      this.disabled = false;
    };

    document.getElementById('btn-check').onclick = async function () {
      if (!demoKey) { alert('Get demo key first.'); return; }
      const out = document.getElementById('check-out');
      let body;
      try {
        body = JSON.parse(document.getElementById('body').value.trim());
      } catch (e) {
        show(out, 'Invalid JSON: ' + e.message, true);
        return;
      }
      this.disabled = true;
      try {
        const res = await AffixAPI.post('/api/eligibility/check', body, demoKey);
        log(out, res);
      } catch (e) { show(out, 'Error: ' + e.message, true); }
      this.disabled = false;
    };
  </script>
</body>
</html>
